{% extends 'base/base.html' %}
{% block title %}Выход из системы{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h2 class="mb-0">Выход из системы</h2>
            </div>
            <div class="card-body text-center">
                <p class="fs-5 mb-4">Вы уверены, что хотите выйти, <strong>{{ user.username }}</strong>?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning btn-lg px-5">Да, выйти</button>
                    <a href="{% url 'entry_list' %}" class="btn btn-secondary btn-lg px-5 ms-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base/base.html' %}
{% block title %}Удалить запись{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h2 class="mb-0">Подтвердите удаление</h2>
            </div>
            <div class="card-body text-center">
                <p>Вы уверены, что хотите удалить запись <strong>"{{ entry.title }}"</strong>?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'entry_detail' entry.pk %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

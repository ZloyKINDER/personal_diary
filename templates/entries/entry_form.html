{% extends 'base/base.html' %}
{% block title %}{{ action }} запись{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h2 class="mb-0">{{ action }} запись</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">{{ action }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
